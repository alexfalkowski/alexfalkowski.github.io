version: 2.1

jobs:
  build:
    docker:
      - image: alexfalkowski/ruby:1.101
    working_directory: ~/alexfalkowski
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - run: make source-key
      - restore_cache:
          name: restore deps
          keys:
            - alexfalkowski-ruby-cache-{{ checksum "Gemfile.lock" }}-{{ checksum "~/.ruby-version" }}-{{ checksum ".source-key" }}
            - alexfalkowski-ruby-cache-
      - run: make dep
      - run: make clean-dep
      - save_cache:
          name: save deps
          key: alexfalkowski-ruby-cache-{{ checksum "Gemfile.lock" }}-{{ checksum "~/.ruby-version" }}-{{ checksum ".source-key" }}
          paths:
            - vendor
      - run: make lint
    resource_class: arm.large
  sync:
    docker:
      - image: alexfalkowski/release:5.59
    working_directory: ~/alexfalkowski
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - run: make sync push
    resource_class: arm.large
  version:
    docker:
      - image: alexfalkowski/release:5.59
    working_directory: ~/alexfalkowski
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - run: version
    resource_class: arm.large
  wait-all:
    docker:
      - image: alexfalkowski/ruby:1.101
    steps:
      - run: echo "all applicable jobs finished"
    resource_class: arm.large

workflows:
  alexfalkowski:
    jobs:
      - build
      - sync:
          requires:
            - build
          filters:
            branches:
              ignore: master
      - version:
          context: gh
          requires:
            - build
          filters:
            branches:
              only: master
      - wait-all:
          requires:
            - build
            - sync
            - version
